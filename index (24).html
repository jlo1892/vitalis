// ============================================================
// SCORING
// ============================================================
function calcScores(days, profile) {
  const sc = {};
  // REST
  const sleepDays = days.filter(d=>d.mc);
  const avgSleep = sleepDays.length ? sleepDays.reduce((s,d)=>s+(d.mc.sleepHours||0),0)/sleepDays.length : 0;
  const avgQual = sleepDays.length ? sleepDays.reduce((s,d)=>s+(d.mc.sleepQuality||0),0)/sleepDays.length : 0;
  const sleepCons = clamp(sleepDays.length/7,0,1);
  sc.rest = Math.round(clamp(avgSleep/profile.sleepGoal,0,1)*40 + (avgQual/5)*30 + sleepCons*30);

  // MOVE
  let totalMin=0, strDays=0, exDays=0;
  days.forEach(d => {
    const m = (d.moves||[]).reduce((s,e)=>s+e.minutes,0) + (d.nc?.exerciseMinutes||0);
    if(m>0) exDays++;
    totalMin += m;
    if((d.moves||[]).some(e=>e.type==='strength') || d.nc?.exerciseType==='strength') strDays++;
  });
  sc.move = Math.round(clamp(totalMin/profile.weeklyExerciseGoal,0,1)*40 + clamp(strDays/profile.strengthDaysGoal,0,1)*25 + clamp(exDays/5,0,1)*35);

  // NOURISH
  const nutDays = days.filter(d=>d.nc);
  const avgCats = nutDays.length ? nutDays.reduce((s,d)=>s+(d.nc.nutritionCats?.length||0),0)/nutDays.length : 0;
  const avgWater = nutDays.length ? nutDays.reduce((s,d)=>s+(d.nc.waterGlasses||0),0)/nutDays.length : 0;
  sc.nourish = Math.round(clamp(avgCats/4,0,1)*50 + clamp(avgWater/profile.waterGoal,0,1)*30 + clamp(nutDays.length/7,0,1)*20);

  // MIND
  const mindDays = days.filter(d=>d.mc||d.nc);
  let stressS=0,moodS=0,selfC=0,socS=0,mc2=0;
  mindDays.forEach(d => {
    mc2++;
    if(d.mc){ stressS+=clamp(1-(d.mc.stressLevel-1)/4,0,1); moodS+=clamp(d.mc.energyLevel/5,0,1); }
    else { stressS+=0.5; moodS+=0.5; }
    if(d.nc){ selfC+=(d.nc.selfCare?.length||0)>0?1:0; socS+=d.nc.socialInteraction?1:0; }
  });
  sc.mind = mc2 ? Math.round((moodS/mc2)*25+(stressS/mc2)*25+(selfC/mc2)*25+(socS/mc2)*25) : 0;

  // SMILE
  let smC=0,smT=0;
  days.forEach(d => {
    if(d.mc||d.nc){ smT++; let v=0; if(d.mc?.brushedMorning) v+=0.4; if(d.nc?.brushedNight) v+=0.3; if(d.nc?.flossed) v+=0.3; smC+=v; }
  });
  sc.smile = smT ? Math.round((smC/smT)*100) : 0;

  // WORK
  const wDays = days.filter(d=>d.nc);
  const avgProd = wDays.length ? wDays.reduce((s,d)=>s+(d.nc.productivityRating||0),0)/wDays.length : 0;
  let compRate = 0, compCount = 0;
  days.forEach(d => {
    const wb = (d.blocks||[]).filter(b=>b.category!=='buffer'&&b.category!=='rest');
    if(wb.length){ compCount++; compRate += wb.filter(b=>b.status==='completed').length/wb.length; }
  });
  sc.work = Math.round((avgProd/5)*50 + (compCount?compRate/compCount:0)*50);

  // TIME
  let tComp=0,tDays=0;
  days.forEach(d => {
    const wb = (d.blocks||[]).filter(b=>b.category!=='buffer'&&b.category!=='rest');
    if(wb.length){ tDays++; tComp += wb.filter(b=>b.status==='completed'||b.status==='partial').length/wb.length; }
  });
  sc.time = tDays ? Math.round((tComp/tDays)*100) : 0;

  // Clamp all
  Object.keys(sc).forEach(k => sc[k] = clamp(sc[k],0,100));

  // Global
  const w = { rest:0.20, move:0.18, nourish:0.17, mind:0.18, work:0.12, smile:0.08, time:0.07 };
  sc.global = Math.round(Object.entries(w).reduce((s,[k,v])=>s+(sc[k]||0)*v, 0));

  return sc;
}

// DATA STORE (localStorage + Firebase)
// ============================================================
const STORAGE_KEY = 'vitalis_data';

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e){ return {}; }
}
function saveLocal(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){} 
}

let cloudSaveTimer = null;
function saveCloud(data, uid) {
  if(!fbDb || !uid) return;
  if(cloudSaveTimer) clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(() => {
    fbDb.collection('users').doc(uid).set({ ...data, updatedAt: Date.now() }, { merge:true }).catch(e=>console.warn('Cloud save err:',e));
  }, 1500);
}

      saveLocal(next);
      if(uid) saveCloud(next, uid);
      return next;
    });
  }, [uid]);

  const todayData = getDay(todayStr());
  const weekData = useMemo(() => last7().map(d => getDay(d)), [dailyData]);

  // Firebase auth + sync

      const u = cred.user.uid;
      setUid(u);
      // Load from cloud
      fbDb.collection('users').doc(u).get().then(snap => {
        if(snap.exists()) {
          const cloud = snap.data();

            const merged = { ...prev };

            return merged;
          });

    review: React.createElement(WeeklyReview, { scores, weekData, profile }),

    React.createElement('nav', {className:'fixed bottom-0 left-0 right-0 glass border-t border-white/5 safe-bottom z-50'},

          React.createElement('button', {key:n.k, onClick:()=>{setTab(n.k);setAM(null);setCM(null);}, className:`flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg transition-all ${tab===n.k?'text-emerald-400':'text-zinc-500 hover:text-zinc-300'}`},

function getDayScore(mod, d) {
  switch(mod){
    case 'rest': return d.mc?Math.round(Math.min(d.mc.sleepHours/7,1)*50+(d.mc.sleepQuality/5)*50):0;
    case 'move': const m=(d.moves||[]).reduce((s,e)=>s+e.minutes,0)+(d.nc?.exerciseMinutes||0); return Math.min(Math.round(m/30*100),100);
    case 'nourish': return d.nc?Math.round(((d.nc.nutritionCats?.length||0)/6)*60+Math.min((d.nc.waterGlasses||0)/8,1)*40):0;
    case 'mind': return d.mc?Math.round((1-(d.mc.stressLevel-1)/4)*50+(d.mc.energyLevel/5)*50):0;
    case 'smile': let ss=0; if(d.mc?.brushedMorning)ss+=40; if(d.nc?.brushedNight)ss+=30; if(d.nc?.flossed)ss+=30; return ss;
    case 'work': return d.nc?Math.round((d.nc.productivityRating||0)/5*100):0;
    case 'time': const wb=(d.blocks||[]).filter(b=>b.category!=='buffer'&&b.category!=='rest'); return wb.length?Math.round(wb.filter(b=>b.status==='completed'||b.status==='partial').length/wb.length*100):0;
    default: return 0;
  }
}
